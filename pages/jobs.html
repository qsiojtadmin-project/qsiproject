<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Listings | Questserv</title>
  <link rel="stylesheet" href="/src/styles/theme.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <a href="/index.html" class="site-brand" aria-label="QuestServ home">
        <img class="brand-logo brand-logo-icon" src="/assets/logo.png" alt="QuestServ logo" />
        <span class="brand-text" aria-hidden="true">
          <span class="brand-title">QUESTSERV</span>
          <span class="brand-subtitle">SOLUTIONS INC.</span>
        </span>
      </a>
      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/pages/jobs.html">Jobs</a>
        <a href="/pages/apply.html">Apply</a>
      </nav>
      <div class="nav-actions">
        <a id="nav-dashboard" class="btn btn-secondary" style="display:none">Dashboard</a>
        <a id="nav-login" class="btn btn-outline" href="/pages/login-only.html">Login</a>
        <a id="nav-register" class="btn btn-primary" href="/pages/login-only.html">Register</a>
        <button id="nav-logout" class="btn btn-outline" style="display:none">Logout</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Open Positions</h1>
      <form id="job-filter-form" class="filters panel">
        <input class="input" type="text" name="keyword" placeholder="Search title or keyword" />
        <input class="input" type="text" name="location" placeholder="Location" />
        <select class="select" name="type">
          <option value="">All job types</option>
          <option>Full-time</option>
          <option>Part-time</option>
          <option>Contract</option>
          <option>Remote</option>
          <option>On-site</option>
          <option>Hybrid</option>
        </select>
        <button class="btn btn-primary" type="submit">Filter Jobs</button>
      </form>
      <div id="job-list" class="grid grid-3"></div>
    </div>
  </main>

  <script type="module" src="/src/js/common.js"></script>
  <script type="module" src="/src/js/jobs.js"></script>
</body>
</html>
