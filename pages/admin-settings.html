<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Settings | Questserv</title>
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/admin-setting.css" />
</head>
<body>
  <header class="navbar admin-navbar">
    <div class="container nav-wrap">
      <a href="/index.html" class="site-brand" aria-label="QuestServ home">
        <img class="brand-logo brand-logo-icon" src="/assets/logo.png" alt="QuestServ logo" />
        <span class="brand-text" aria-hidden="true">
          <span class="brand-title">QUESTSERV</span>
          <span class="brand-subtitle">SOLUTIONS INC.</span>
        </span>
      </a>
      <div class="admin-head-search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input type="text" placeholder="Search applicants, posts, users..." />
      </div>
      <div class="admin-head-actions">
        <button type="button" class="admin-head-icon" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V10a6 6 0 0 0-12 0v4.2a2 2 0 0 1-.6 1.4L4 17h5"></path><path d="M9 17a3 3 0 0 0 6 0"></path></svg>
        </button>
        <button type="button" class="admin-head-icon" aria-label="Messages">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"></path><path d="m4 7 8 6 8-6"></path></svg>
        </button>
        <div class="admin-user-pill">
          <span class="admin-user-avatar">A</span>
          <span>Admin</span>
        </div>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" aria-label="Admin navigation">
        <a class="sidebar-link" href="/pages/admin-dashboard.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-applicants.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="3"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg>
          <span>Applicants</span>
        </a>
        <a class="sidebar-link is-disabled" href="javascript:void(0)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="3"></circle><circle cx="18" cy="8" r="3"></circle></svg>
          <span>User Management</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-jobs.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg>
          <span>Job Hire Templates</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-home-posts.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path></svg>
          <span>Home Posts</span>
        </a>
        <a class="sidebar-link active" href="/pages/admin-settings.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.6 1.6 0 0 0-1.76-.32 1.6 1.6 0 0 0-1 1.45V21a2 2 0 0 1-4 0v-.09a1.6 1.6 0 0 0-1-1.45 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .32-1.76 1.6 1.6 0 0 0-1.45-1H3a2 2 0 0 1 0-4h.09a1.6 1.6 0 0 0 1.45-1 1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.76.32h.01a1.6 1.6 0 0 0 1-1.45V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 1 1.45 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.32 1.76v.01a1.6 1.6 0 0 0 1.45 1H21a2 2 0 0 1 0 4h-.09a1.6 1.6 0 0 0-1.45 1Z"></path></svg>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-foot">
        <button id="nav-logout" class="btn sidebar-link sidebar-logout" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <button id="mobile-toggle" class="btn btn-secondary mobile-toggle">Menu</button>
      <section class="form-card admin-settings-card">
        <h1>Admin Settings</h1
        <p class="muted">Update your profile and account password.</p>
        <div id="feedback"></div>
        <form id="settings-form" class="form-grid">
          <input class="input" name="name" placeholder="Full name" required />
          <input class="input" name="email" type="email" placeholder="Email" required />
          <input class="input" name="password" type="password" placeholder="New password (optional)" />
          <button class="btn btn-primary" type="submit">Update Profile</button>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="/src/js/common.js"></script>
  <script type="module" src="/src/js/admin-common.js"></script>
  <script type="module" src="/src/js/admin-settings.js"></script>
</body>
</html>
