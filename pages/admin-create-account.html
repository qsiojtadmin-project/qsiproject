<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Create Account | QuestServ Solutions Inc.</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --panel: #ffffff;
      --line: #d7dde3;
      --text: #0f172a;
      --muted: #475569;
      --green: #14532d;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { margin: 0; color: var(--muted); }
    .back {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .field { display: grid; gap: 8px; }
    .field.full { grid-column: 1 / -1; }
    label { font-weight: 700; color: var(--text); }
    input, select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 12px;
      font: inherit;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }
    button {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }
    .primary {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
    .note {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px dashed #b8c3cf;
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="head">
      <div>
        <h1>Create Admin Account</h1>
        <p>Manual admin registration form for QuestServ staff setup.</p>
      </div>
      <a class="back" href="/index.html">Back</a>
    </div>

    <form>
      <div class="grid">
        <div class="field full">
          <label for="adminFullName">Full Name</label>
          <input id="adminFullName" type="text" placeholder="Enter full name" />
        </div>
        <div class="field">
          <label for="adminEmail">Email Address</label>
          <input id="adminEmail" type="email" placeholder="admin@questserv.com" />
        </div>
        <div class="field">
          <label for="adminPhone">Phone Number</label>
          <input id="adminPhone" type="text" placeholder="+63 900 000 0000" />
        </div>
        <div class="field">
          <label for="adminRole">Access Role</label>
          <select id="adminRole">
            <option>Admin</option>
            <option>Super Admin</option>
          </select>
        </div>
        <div class="field">
          <label for="adminCode">Admin Verification Code</label>
          <input id="adminCode" type="text" placeholder="Enter code" />
        </div>
        <div class="field">
          <label for="adminPassword">Password</label>
          <input id="adminPassword" type="password" placeholder="Minimum 8 characters" />
        </div>
        <div class="field">
          <label for="adminConfirmPassword">Confirm Password</label>
          <input id="adminConfirmPassword" type="password" placeholder="Re-enter password" />
        </div>
      </div>
      <div class="actions">
        <button type="button">Cancel</button>
        <button class="primary" type="submit">Create Admin Account</button>
      </div>
      <div class="note">UI only: backend submit handling is not connected yet.</div>
    </form>
  </section>
</body>
</html>
