<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin User Management | Questserv</title>
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <style>
    .um-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .um-stat {
      background: #ffffff;
      border: 1px solid #d6dde5;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
      padding: 14px 16px;
    }

    .um-stat-label {
      color: #61768f;
      font-size: 0.85rem;
      margin: 0;
    }

    .um-stat-value {
      margin: 8px 0 0;
      font-size: 1.65rem;
      color: #0f1f3d;
      font-weight: 800;
      line-height: 1.1;
    }

    .um-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .um-card {
      border: 1px solid #d6dde5;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      background: #ffffff;
      padding: 18px;
    }

    .um-form {
      display: grid;
      gap: 10px;
    }

    .um-feedback {
      min-height: 22px;
      font-size: 0.9rem;
    }

    .um-feedback.error {
      color: #b91c1c;
    }

    .um-feedback.success {
      color: #166534;
    }

    .role-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #e7f8ef;
      color: #0f766e;
      text-transform: uppercase;
    }

    .role-pill.admin {
      background: #e0ecff;
      color: #1d4ed8;
    }

    .um-toolbar {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .um-empty {
      text-align: center;
      color: #64748b;
      padding: 20px;
    }

    .table-wrap table td:last-child,
    .table-wrap table th:last-child {
      text-align: right;
    }

    @media (max-width: 980px) {
      .um-stats {
        grid-template-columns: 1fr;
      }

      .um-grid {
        grid-template-columns: 1fr;
      }

      .um-toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="navbar admin-navbar">
    <div class="container nav-wrap">
      <a href="/index.html" class="site-brand" aria-label="QuestServ home">
        <img class="brand-logo brand-logo-icon" src="/assets/logo1.png.png" alt="QuestServ logo" />
      </a>
      <div class="admin-head-search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input type="text" placeholder="Search applicants, posts, users..." />
      </div>
      <div class="admin-head-actions">
        <button type="button" class="admin-head-icon" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V10a6 6 0 0 0-12 0v4.2a2 2 0 0 1-.6 1.4L4 17h5"></path><path d="M9 17a3 3 0 0 0 6 0"></path></svg>
        </button>
        <button type="button" class="admin-head-icon" aria-label="Messages">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"></path><path d="m4 7 8 6 8-6"></path></svg>
        </button>
        <div class="admin-user-pill">
          <span class="admin-user-avatar">A</span>
          <span id="session-label">Admin</span>
        </div>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" aria-label="Admin navigation">
        <a class="sidebar-link" href="/pages/admin-dashboard.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-applicants.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="3"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg>
          <span>Applicants</span>
        </a>
        <a class="sidebar-link active" href="/pages/admin-ui.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="3"></circle><circle cx="18" cy="8" r="3"></circle></svg>
          <span>User Management</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-jobs.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg>
          <span>Job Hire Templates</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-home-posts.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path></svg>
          <span>Home Posts</span>
        </a>
        <a class="sidebar-link" href="/pages/admin-settings.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.6 1.6 0 0 0-1.76-.32 1.6 1.6 0 0 0-1 1.45V21a2 2 0 0 1-4 0v-.09a1.6 1.6 0 0 0-1-1.45 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .32-1.76 1.6 1.6 0 0 0-1.45-1H3a2 2 0 0 1 0-4h.09a1.6 1.6 0 0 0 1.45-1 1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.76.32h.01a1.6 1.6 0 0 0 1-1.45V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 1 1.45 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.32 1.76v.01a1.6 1.6 0 0 0 1.45 1H21a2 2 0 0 1 0 4h-.09a1.6 1.6 0 0 0-1.45 1Z"></path></svg>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-foot">
        <button id="nav-logout" class="btn sidebar-link sidebar-logout" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <button id="mobile-toggle" class="btn btn-secondary mobile-toggle">Menu</button>
      <p class="admin-badge">Admin Only</p>
      <h1 class="admin-title">User Management</h1>
      <p class="admin-subtitle">Create user accounts and manage access roles.</p>

      <section class="um-stats" aria-label="User management summary">
        <article class="um-stat">
          <p class="um-stat-label">Total Accounts</p>
          <p id="um-total-users" class="um-stat-value">0</p>
        </article>
        <article class="um-stat">
          <p class="um-stat-label">Admin Accounts</p>
          <p id="um-admin-count" class="um-stat-value">0</p>
        </article>
        <article class="um-stat">
          <p class="um-stat-label">User Accounts</p>
          <p id="um-user-count" class="um-stat-value">0</p>
        </article>
      </section>

      <div class="um-grid">
        <section class="um-card">
          <h2 style="margin-top:0">Create User</h2>
          <p class="muted" style="margin-top:0">Only admin can create accounts.</p>
          <div id="user-feedback" class="um-feedback" aria-live="polite"></div>
          <form id="create-user-form" class="um-form">
            <input class="input" id="name" name="name" placeholder="Full name" required />
            <input class="input" id="email" name="email" type="email" placeholder="Email address" required />
            <input class="input" id="password" name="password" type="password" placeholder="Password (min 6 chars)" required />
            <select class="select" id="role" name="role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
            <button id="create-user-btn" class="btn btn-primary" type="submit">Create User</button>
          </form>
        </section>

        <section class="um-card">
          <h2 style="margin-top:0">Accounts</h2>
          <div class="um-toolbar">
            <input class="input" id="user-search" type="text" placeholder="Search by name or email" />
            <select class="select" id="user-role-filter">
              <option value="all">All roles</option>
              <option value="admin">Admin</option>
              <option value="user">User</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="users-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="/src/js/common.js"></script>
  <script type="module" src="/src/js/admin-common.js"></script>
  <script type="module" src="/src/js/admin-user-management.js"></script>
</body>
</html>
