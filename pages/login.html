<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Questserv</title>
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/login.css" />
</head>
<body>
  <header class="navbar">
    <div
     class="container nav-wrap">
      <a href="/index.html" class="site-brand" aria-label="QuestServ home">
        <img class="brand-logo brand-logo-icon" src="/assets/logo.png" alt="QuestServ logo" />
        <span class="brand-text" aria-hidden="true">
          <span class="brand-title">QUESTSERV</span>
          <span class="brand-subtitle">SOLUTIONS INC.</span>
        </span>
      </a>
      <div class="nav-actions">
        <a class="btn btn-outline" href="/pages/register.html">Full register page</a>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-grid">
      <section class="form-card">
        <h1>Login</h1>
        <p class="muted">Access your user or admin account.</p>
        <div id="login-feedback"></div>
        <form id="login-form" class="form-grid">
          <input class="input" name="email" type="email" placeholder="Email" required />
          <div class="password-field">
            <input class="input" id="login-password" name="password" type="password" placeholder="Password" required />
            <button class="password-toggle" type="button" data-password-toggle data-target="login-password" aria-label="Show password" aria-pressed="false"></button>
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
      </section>

      <section class="form-card">
        <h2>Create Account</h2>
        <p class="muted">Register a new user or admin account and save it directly to the database.</p>
        <div id="register-feedback"></div>
        <form id="register-form" class="form-grid">
          <input class="input" name="name" type="text" placeholder="Full name" required />
          <input class="input" name="email" type="email" placeholder="Email" required />
          <div class="password-field">
            <input class="input" id="register-password" name="password" type="password" placeholder="Password (min. 6 chars)" required />
            <button class="password-toggle" type="button" data-password-toggle data-target="register-password" aria-label="Show password" aria-pressed="false"></button>
          </div>
          <select class="select" id="role" name="role" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
          <div class="password-field" id="admin-code-field">
            <input class="input" id="admin_code" name="admin_code" type="password" placeholder="Admin registration code" />
            <button class="password-toggle" type="button" data-password-toggle data-target="admin_code" aria-label="Show password" aria-pressed="false"></button>
          </div>
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
      </section>
    </section>
  </main>

  <script type="module" src="/src/js/auth.js"></script>
</body>
</html>
